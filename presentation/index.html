<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Atari Pong</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        canvas { display: block; border: 2px solid #333; cursor: default; }
    </style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<script>
// ── constants ──────────────────────────────────────────────────────────────
const W  = 800, H = 600, CX = 400, CY = 300;
const WS_PORT = 8765;

const BLACK  = '#000000', WHITE  = '#FFFFFF', GRAY  = '#787878';
const GREEN  = '#32C864', RED    = '#DC3C3C', YELLOW = '#FFDC00';
const CYAN   = '#00C8DC';

// ── clickable button regions per state ────────────────────────────────────
// Each entry: { x, y, w, h, code }  — x/y = top-left corner of hit area
const REGIONS = {
    MENU: [
        { x: 190, y: 292, w: 420, h: 52, code: 'Enter' }
    ],
    MODE_SELECTION: [
        { x: 155, y: 268, w: 490, h: 56, code: 'Digit1' },
        { x: 195, y: 326, w: 410, h: 56, code: 'Digit2' },
        { x: 285, y: 388, w: 230, h: 44, code: 'Escape' }
    ],
    PAUSED: [
        { x: 225, y: 305, w: 350, h: 52, code: 'KeyP' }
    ],
    GAME_OVER: [
        { x: 225, y: 288, w: 350, h: 52, code: 'KeyR'   },
        { x: 255, y: 342, w: 290, h: 52, code: 'Escape' }
    ],
    PLAYING: [
        { x: 746, y: 5, w: 46, h: 34, code: 'KeyP' }   // pause icon
    ]
};

// ── state ─────────────────────────────────────────────────────────────────
let gameState = null;
let ws        = null;
let mouseX    = -1, mouseY = -1;

const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');

// ── WebSocket ─────────────────────────────────────────────────────────────
function connect() {
    ws = new WebSocket(`ws://localhost:${WS_PORT}`);
    ws.onmessage = e => { gameState = JSON.parse(e.data); };
    ws.onclose   = () => setTimeout(connect, 2000);
    ws.onerror   = () => ws.close();
}

function sendKey(code) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'keydown', code }));
    setTimeout(() => ws.send(JSON.stringify({ type: 'keyup', code })), 60);
}

// ── input ─────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
    e.preventDefault();
    if (ws?.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'keydown', code: e.code }));
});
window.addEventListener('keyup', e => {
    if (ws?.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'keyup', code: e.code }));
});

canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouseX = e.clientX - r.left;
    mouseY = e.clientY - r.top;
    const regions = REGIONS[gameState?.status] || [];
    canvas.style.cursor = regions.some(b => hit(b, mouseX, mouseY)) ? 'pointer' : 'default';
});
canvas.addEventListener('mouseleave', () => { mouseX = -1; mouseY = -1; canvas.style.cursor = 'default'; });

canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    const regions = REGIONS[gameState?.status] || [];
    const btn = regions.find(b => hit(b, x, y));
    if (btn) sendKey(btn.code);
});

function hit(b, x, y) {
    return x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h;
}

// ── draw helpers ──────────────────────────────────────────────────────────
function drawHoverHighlights(status) {
    const regions = REGIONS[status] || [];
    regions.forEach(b => {
        if (!hit(b, mouseX, mouseY)) return;
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,0.07)';
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.strokeStyle = 'rgba(255,255,255,0.45)';
        ctx.lineWidth = 1;
        ctx.strokeRect(b.x + 0.5, b.y + 0.5, b.w - 1, b.h - 1);
        ctx.restore();
    });
}

function drawPauseBtn() {
    const b = REGIONS.PLAYING[0];
    const hovered = hit(b, mouseX, mouseY);
    ctx.save();
    ctx.fillStyle = hovered ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.08)';
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.fillStyle = hovered ? WHITE : GRAY;
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('II', b.x + b.w / 2, b.y + b.h / 2);
    ctx.restore();
}

// ── renderers ─────────────────────────────────────────────────────────────
function drawConnecting() {
    ctx.fillStyle = BLACK;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = GRAY;
    ctx.font = '28px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('Conectando...', CX, CY);
}

function drawGame(s) {
    ctx.fillStyle = BLACK;
    ctx.fillRect(0, 0, W, H);

    // center line
    ctx.fillStyle = GRAY;
    for (let y = 10; y < H; y += 30) ctx.fillRect(CX - 2, y, 4, 16);

    // paddles
    [s.paddleLeft, s.paddleRight].forEach(p => {
        const r = 4;
        ctx.fillStyle = WHITE;
        ctx.beginPath();
        ctx.moveTo(p.x + r, p.y);
        ctx.arcTo(p.x + p.width, p.y,            p.x + p.width, p.y + p.height, r);
        ctx.arcTo(p.x + p.width, p.y + p.height, p.x,           p.y + p.height, r);
        ctx.arcTo(p.x,           p.y + p.height, p.x,           p.y,            r);
        ctx.arcTo(p.x,           p.y,             p.x + p.width, p.y,            r);
        ctx.closePath();
        ctx.fill();
    });

    // ball
    ctx.fillStyle = WHITE;
    ctx.beginPath();
    ctx.arc(s.ball.x, s.ball.y, s.ball.radius, 0, Math.PI * 2);
    ctx.fill();

    // power-up
    if (s.powerUp) {
        ctx.fillStyle   = s.powerUp.type === 'GROW' ? GREEN : RED;
        ctx.strokeStyle = WHITE;
        ctx.lineWidth   = 2;
        ctx.beginPath();
        ctx.arc(s.powerUp.x, s.powerUp.y, s.powerUp.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
    }

    // scores
    ctx.fillStyle = WHITE;
    ctx.font = 'bold 64px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(s.scoreLeft,  W / 4,     70);
    ctx.fillText(s.scoreRight, W * 3 / 4, 70);

    // effect timers
    ctx.font = '22px monospace';
    if (s.effectTimerLeft > 0) {
        ctx.fillStyle = YELLOW; ctx.textAlign = 'left';
        ctx.fillText(`P1  ${Math.ceil(s.effectTimerLeft)}s`, 10, H - 14);
    }
    if (s.effectTimerRight > 0) {
        ctx.fillStyle = YELLOW; ctx.textAlign = 'right';
        ctx.fillText(`P2  ${Math.ceil(s.effectTimerRight)}s`, W - 10, H - 14);
    }
}

function drawMenu() {
    ctx.fillStyle = BLACK;
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = WHITE;
    ctx.font = 'bold 80px monospace';
    ctx.fillText('ATARI PONG', CX, CY - 60);
    ctx.fillStyle = GRAY;
    ctx.font = '30px monospace';
    ctx.fillText('[ ENTER ]  Jugar', CX, CY + 20);
    ctx.font = '16px monospace';
    ctx.fillText('clic o tecla', CX, CY + 52);
    ctx.font = '18px monospace';
    ctx.fillText('Universidad Internacional del Ecuador', CX, CY + 130);
}

function drawModeSelection() {
    ctx.fillStyle = BLACK;
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = WHITE;
    ctx.font = 'bold 56px monospace';
    ctx.fillText('MODO DE JUEGO', CX, CY - 80);
    ctx.fillStyle = CYAN;
    ctx.font = '32px monospace';
    ctx.fillText('[ 1 ]  1 Jugador  (vs IA)', CX, CY);
    ctx.fillStyle = GREEN;
    ctx.fillText('[ 2 ]  2 Jugadores', CX, CY + 55);
    ctx.fillStyle = GRAY;
    ctx.font = '22px monospace';
    ctx.fillText('[ ESC ]  volver', CX, CY + 115);
}

function drawPause() {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = WHITE;
    ctx.font = 'bold 56px monospace';
    ctx.fillText('PAUSA', CX, CY - 20);
    ctx.fillStyle = GRAY;
    ctx.font = '28px monospace';
    ctx.fillText('[ P ]  continuar', CX, CY + 32);
}

function drawGameOver(winner) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = YELLOW;
    ctx.font = 'bold 64px monospace';
    ctx.fillText(`¡${winner} gana!`, CX, CY - 60);
    ctx.fillStyle = WHITE;
    ctx.font = '30px monospace';
    ctx.fillText('[ R ]  Reiniciar', CX, CY + 20);
    ctx.fillStyle = GRAY;
    ctx.fillText('[ ESC ]  Menú', CX, CY + 70);
}

// ── main render loop ───────────────────────────────────────────────────────
function render() {
    const s = gameState;

    if (!s) {
        drawConnecting();
    } else if (s.status === 'MENU') {
        drawMenu();
        drawHoverHighlights('MENU');
    } else if (s.status === 'MODE_SELECTION') {
        drawModeSelection();
        drawHoverHighlights('MODE_SELECTION');
    } else if (s.status === 'PLAYING') {
        drawGame(s);
        drawPauseBtn();
        drawHoverHighlights('PLAYING');
    } else if (s.status === 'PAUSED') {
        drawGame(s);
        drawPause();
        drawHoverHighlights('PAUSED');
    } else if (s.status === 'GAME_OVER') {
        drawGame(s);
        drawGameOver(s.winner);
        drawHoverHighlights('GAME_OVER');
    }

    requestAnimationFrame(render);
}

connect();
requestAnimationFrame(render);
</script>
</body>
</html>
