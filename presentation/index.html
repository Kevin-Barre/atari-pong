<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Atari Pong</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        canvas { display: block; cursor: default; }
    </style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<script>
const W = 800, H = 600, CX = 400, CY = 300;
const WS_PORT = 8765;

const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');

// ── background image ───────────────────────────────────────────────────────
const stadiumBg = new Image();
stadiumBg.src = '../assets/football-soccer-with-green-vector.jpg';

// ── theme + ui state ───────────────────────────────────────────────────────
let theme        = 'classic'; // 'classic' | 'stadium'
let showInfo     = false;
let pausedByInfo = false;   // true cuando nosotros pausamos al abrir el panel

const THEME_BTNS = [
    { x:248, y:422, w:140, h:44, id:'classic', label:'Clásico'    },
    { x:412, y:422, w:140, h:44, id:'stadium', label:'Estadio ⚽' }
];

const INFO_BTN = { x:752, y:8, w:36, h:36 };

// ── helpers ────────────────────────────────────────────────────────────────
function rr(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w,y,   x+w,y+h, r);
    ctx.arcTo(x+w,y+h, x,  y+h, r);
    ctx.arcTo(x,  y+h, x,  y,   r);
    ctx.arcTo(x,  y,   x+w,y,   r);
    ctx.closePath();
}

function drawBtn(x, y, w, h, label, hov, opts={}) {
    const r = opts.r ?? 10, fs = opts.fs ?? 18, fw = opts.fw ?? '600', fc = opts.fc ?? '#fff';
    ctx.save();
    rr(x,y,w,h,r);
    ctx.fillStyle = hov ? (opts.hbg ?? 'rgba(255,255,255,0.16)') : (opts.bg ?? 'rgba(255,255,255,0.07)');
    ctx.fill();
    rr(x,y,w,h,r);
    ctx.strokeStyle = hov ? (opts.hbd ?? 'rgba(255,255,255,0.9)') : (opts.bd ?? 'rgba(255,255,255,0.28)');
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = fc;
    ctx.font = `${fw} ${fs}px system-ui, -apple-system, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, x+w/2, y+h/2);
    ctx.restore();
}

function hit(b, x, y) { return x>=b.x && x<=b.x+b.w && y>=b.y && y<=b.y+b.h; }

// ── button regions ─────────────────────────────────────────────────────────
const R = {
    MENU:           [{ x:270, y:318, w:260, h:60, code:'Enter'  }],
    MODE_SELECTION: [
        { x:100, y:210, w:255, h:240, code:'Digit1' },
        { x:445, y:210, w:255, h:240, code:'Digit2' },
        { x:315, y:496, w:170, h:48,  code:'Escape' }
    ],
    PAUSED: [
        { x:255, y:272, w:290, h:58,  code:'KeyP'   },
        { x:310, y:346, w:180, h:46,  code:'Escape' }
    ],
    GAME_OVER: [
        { x:245, y:310, w:310, h:58,  code:'KeyR'   },
        { x:310, y:384, w:180, h:46,  code:'Escape' }
    ],
    PLAYING: [{ x:370, y:8, w:60, h:36, code:'KeyP' }]
};

function activeRegions() { return R[gs?.status] ?? []; }

// ── state ──────────────────────────────────────────────────────────────────
let gs = null, ws = null, mx = -1, my = -1;

// ── websocket ──────────────────────────────────────────────────────────────
function connect() {
    ws = new WebSocket(`ws://localhost:${WS_PORT}`);
    ws.onmessage = e => { gs = JSON.parse(e.data); };
    ws.onclose   = () => setTimeout(connect, 2000);
    ws.onerror   = () => ws.close();
}
function send(code) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type:'keydown', code }));
    setTimeout(() => ws.send(JSON.stringify({ type:'keyup', code })), 60);
}

function openInfo() {
    showInfo = true;
    if (gs?.status === 'PLAYING') { pausedByInfo = true; send('KeyP'); }
}

function closeInfo() {
    showInfo = false;
    if (pausedByInfo) { pausedByInfo = false; send('KeyP'); }
}

// ── input ──────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
    e.preventDefault();
    if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type:'keydown', code:e.code }));
});
window.addEventListener('keyup', e => {
    if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type:'keyup', code:e.code }));
});

canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mx = e.clientX-r.left; my = e.clientY-r.top;
    const onWsBtn    = activeRegions().some(b => hit(b,mx,my));
    const onThemeBtn = (!gs || gs.status === 'MENU') && THEME_BTNS.some(b => hit(b,mx,my));
    const onInfoBtn  = gs?.status === 'PLAYING' && !showInfo && hit(INFO_BTN, mx, my);
    canvas.style.cursor = (onWsBtn || onThemeBtn || onInfoBtn) ? 'pointer' : 'default';
});
canvas.addEventListener('mouseleave', () => { mx=-1; my=-1; canvas.style.cursor='default'; });

canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    const x = e.clientX-r.left, y = e.clientY-r.top;
    if (showInfo) { closeInfo(); return; }
    if (gs?.status === 'PLAYING' && hit(INFO_BTN, x, y)) { openInfo(); return; }
    if (!gs || gs.status === 'MENU') {
        const tb = THEME_BTNS.find(b => hit(b,x,y));
        if (tb) { theme = tb.id; return; }
    }
    const b = activeRegions().find(b => hit(b,x,y));
    if (b) send(b.code);
});

// ── CONNECTING ─────────────────────────────────────────────────────────────
function drawConnecting() {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
    const dots = '   . . .'.slice(0, 3+(Math.floor(Date.now()/350)%4)*2);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '20px system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Conectando'+dots, CX, CY);
}

// ── MENU ───────────────────────────────────────────────────────────────────
function drawMenu() {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1;
    for (let x=0; x<W; x+=50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }

    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '13px system-ui, sans-serif';
    ctx.letterSpacing = '0.3em';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('A T A R I', CX, 148);
    ctx.letterSpacing = '0';

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 118px system-ui, -apple-system, sans-serif';
    ctx.fillText('PONG', CX, 274);

    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(CX-80, 290, 160, 1);

    drawBtn(R.MENU[0].x, R.MENU[0].y, R.MENU[0].w, R.MENU[0].h,
        'Jugar', hit(R.MENU[0],mx,my),
        { fs:22, fw:'700', r:12, bg:'rgba(255,255,255,0.09)', hbg:'rgba(255,255,255,0.18)',
          bd:'rgba(255,255,255,0.35)', hbd:'rgba(255,255,255,1)' });

    ctx.fillStyle = 'rgba(255,255,255,0.32)';
    ctx.font = '12px system-ui, sans-serif';
    ctx.fillText('CAMPO', CX, 414);

    THEME_BTNS.forEach(tb => {
        const sel = theme === tb.id, hov = hit(tb, mx, my);
        ctx.save();
        rr(tb.x, tb.y, tb.w, tb.h, 8);
        ctx.fillStyle = sel ? 'rgba(255,255,255,0.13)' : hov ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.04)';
        ctx.fill();
        rr(tb.x, tb.y, tb.w, tb.h, 8);
        ctx.strokeStyle = sel ? 'rgba(255,255,255,0.85)' : hov ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.18)';
        ctx.lineWidth = sel ? 2 : 1.2; ctx.stroke();
        ctx.fillStyle = tb.id === 'stadium' ? '#32a852' : '#ffffff';
        ctx.beginPath(); ctx.arc(tb.x+20, tb.y+tb.h/2, 7, 0, Math.PI*2); ctx.fill();
        if (tb.id === 'stadium') {
            ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1; ctx.stroke();
        }
        ctx.fillStyle = sel ? '#fff' : 'rgba(255,255,255,0.6)';
        ctx.font = `${sel?'600':'500'} 14px system-ui, sans-serif`;
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(tb.label, tb.x+36, tb.y+tb.h/2);
        ctx.restore();
    });

    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.font = '13px system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('Universidad Internacional del Ecuador', CX, 575);
}

// ── MODE SELECTION ─────────────────────────────────────────────────────────
function drawModeSelection() {
    if (theme === 'stadium' && stadiumBg.complete && stadiumBg.naturalWidth > 0) {
        ctx.drawImage(stadiumBg, 0, 0, W, H);
        // Thin wash so card text stays readable without hiding the image
        ctx.fillStyle = 'rgba(0,0,0,0.22)';
        ctx.fillRect(0, 0, W, H);
    } else {
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
    }

    ctx.save();
    if (theme === 'stadium') { ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 10; }
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 34px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('Elige tu modo de juego', CX, 152);
    ctx.restore();

    drawModeCard(R.MODE_SELECTION[0], '1 Jugador',   'vs. IA',        '#00C8DC', false);
    drawModeCard(R.MODE_SELECTION[1], '2 Jugadores', 'Mismo teclado', '#32C864', true);

    const hbk = hit(R.MODE_SELECTION[2],mx,my);
    drawBtn(R.MODE_SELECTION[2].x, R.MODE_SELECTION[2].y, R.MODE_SELECTION[2].w, R.MODE_SELECTION[2].h,
        'Volver', hbk,
        { fs:16, fc:'rgba(255,255,255,0.7)', bg:'rgba(255,255,255,0.04)',
          hbg:'rgba(255,255,255,0.1)', bd:'rgba(255,255,255,0.15)', hbd:'rgba(255,255,255,0.5)' });
}

function drawModeCard(b, title, sub, accent, isTwo) {
    const hov = hit(b,mx,my), { x, y, w, h } = b;
    ctx.save();
    rr(x,y,w,h,12);
    ctx.fillStyle = hov ? 'rgba(255,255,255,0.14)' : 'rgba(255,255,255,0.08)'; ctx.fill();
    rr(x,y,w,h,12);
    ctx.strokeStyle = hov ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.22)'; ctx.lineWidth=1.5; ctx.stroke();
    rr(x,y,w,4,12); ctx.fillStyle = hov ? accent : accent+'88'; ctx.fill();

    const iconY = y+70;
    if (isTwo) {
        ctx.fillStyle = hov ? '#fff' : 'rgba(255,255,255,0.6)';
        ctx.fillRect(x+66, iconY, 10, 52); ctx.fillRect(x+175, iconY, 10, 52);
        ctx.beginPath(); ctx.arc(x+w/2, iconY+26, 6, 0, Math.PI*2);
        ctx.fillStyle = hov ? '#fff' : 'rgba(255,255,255,0.5)'; ctx.fill();
    } else {
        ctx.fillStyle = hov ? '#fff' : 'rgba(255,255,255,0.7)';
        ctx.fillRect(x+178, iconY, 10, 52);
        ctx.strokeStyle = hov ? accent : accent+'aa'; ctx.lineWidth=2;
        ctx.setLineDash([5,4]); ctx.strokeRect(x+65, iconY, 10, 52); ctx.setLineDash([]);
        ctx.beginPath(); ctx.arc(x+w/2-20, iconY+26, 6, 0, Math.PI*2);
        ctx.fillStyle = hov ? '#fff' : 'rgba(255,255,255,0.5)'; ctx.fill();
    }

    ctx.fillStyle = hov ? '#fff' : 'rgba(255,255,255,0.9)';
    ctx.font = 'bold 22px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText(title, x+w/2, y+160);
    ctx.fillStyle = hov ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.38)';
    ctx.font = '14px system-ui, sans-serif';
    ctx.fillText(sub, x+w/2, y+185);
    ctx.fillStyle = hov ? accent : 'rgba(255,255,255,0.2)';
    ctx.font = '600 13px system-ui, sans-serif';
    ctx.fillText('Seleccionar', x+w/2, y+220);
    ctx.restore();
}

// ── FIELD DRAWING ──────────────────────────────────────────────────────────
function drawClassicField() {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillRect(0,0,W,3); ctx.fillRect(0,H-3,W,3);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    for (let y=10; y<H; y+=28) ctx.fillRect(CX-2,y,4,14);
}

function drawStadiumField() {
    if (stadiumBg.complete && stadiumBg.naturalWidth > 0) {
        ctx.drawImage(stadiumBg, 0, 0, W, H);
    } else {
        const stripe = 60;
        for (let i = 0; i*stripe < H; i++) {
            ctx.fillStyle = i%2===0 ? '#2d7a2d' : '#267026';
            ctx.fillRect(0, i*stripe, W, stripe);
        }
    }
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillRect(0,0,W,4); ctx.fillRect(0,H-4,W,4);
    ctx.fillRect(0,0,4,H); ctx.fillRect(W-4,0,4,H);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillRect(CX-2, 0, 4, H);
    ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(CX, CY, 68, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(CX, CY, 5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.65)'; ctx.lineWidth = 2;
    ctx.strokeRect(4, CY-90, 90, 180); ctx.strokeRect(W-94, CY-90, 90, 180);
    ctx.strokeRect(4, CY-44, 36, 88);  ctx.strokeRect(W-40, CY-44, 36, 88);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.arc(70, CY, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(W-70, CY, 3, 0, Math.PI*2); ctx.fill();
    const ca = 14;
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5;
    [[4,4,0,Math.PI/2],[W-4,4,Math.PI/2,Math.PI],[4,H-4,-Math.PI/2,0],[W-4,H-4,Math.PI,3*Math.PI/2]]
        .forEach(([x,y,s,e])=>{ ctx.beginPath(); ctx.arc(x,y,ca,s,e); ctx.stroke(); });
    ctx.restore();
}

// ── GAME ───────────────────────────────────────────────────────────────────
function drawGame(s) {
    if (theme === 'stadium') drawStadiumField();
    else                     drawClassicField();

    const textCol = theme === 'stadium' ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.22)';
    const p2label = s.twoPlayerMode ? 'P2' : 'IA';

    // Scores — shadow in stadium so they pop over the image
    ctx.save();
    if (theme === 'stadium') { ctx.shadowColor = 'rgba(0,0,0,1)'; ctx.shadowBlur = 8; }
    ctx.fillStyle = textCol;
    ctx.font = '13px system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('P1', W/4, 22);
    ctx.fillText(p2label, W*3/4, 22);
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.font = 'bold 58px monospace';
    ctx.fillText(s.scoreLeft,  W/4,   70);
    ctx.fillText(s.scoreRight, W*3/4, 70);
    ctx.restore();

    // Paddles
    [s.paddleLeft, s.paddleRight].forEach(p => {
        ctx.fillStyle = '#ffffff';
        rr(p.x, p.y, p.width, p.height, 5); ctx.fill();
    });

    // Ball
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.ball.x, s.ball.y, s.ball.radius, 0, Math.PI*2); ctx.fill();
    if (theme === 'stadium') {
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(s.ball.x, s.ball.y, s.ball.radius*0.38, 0, Math.PI*2); ctx.fill();
    }

    // Power-up
    if (s.powerUp) {
        const c = s.powerUp.type === 'GROW' ? '#32C864' : '#DC3C3C';
        ctx.fillStyle = c; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(s.powerUp.x, s.powerUp.y, s.powerUp.radius, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
    }

    // Effect timers
    if (s.effectTimerLeft > 0) {
        ctx.fillStyle = '#FFDC00'; ctx.font = '13px system-ui, sans-serif';
        ctx.textAlign = 'left'; ctx.fillText(`${Math.ceil(s.effectTimerLeft)}s`, 14, H-14);
    }
    if (s.effectTimerRight > 0) {
        ctx.fillStyle = '#FFDC00'; ctx.font = '13px system-ui, sans-serif';
        ctx.textAlign = 'right'; ctx.fillText(`${Math.ceil(s.effectTimerRight)}s`, W-14, H-14);
    }

    // Pause + info buttons (only during PLAYING)
    if (gs?.status === 'PLAYING') {
        const pb = R.PLAYING[0], phov = hit(pb,mx,my);
        ctx.save();
        rr(pb.x,pb.y,pb.w,pb.h,8);
        ctx.fillStyle = phov ? 'rgba(0,0,0,0.6)' : 'rgba(0,0,0,0.4)'; ctx.fill();
        rr(pb.x,pb.y,pb.w,pb.h,8);
        ctx.strokeStyle = phov ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.22)'; ctx.lineWidth=1.2; ctx.stroke();
        const bx=pb.x+pb.w/2, by=pb.y+pb.h/2;
        ctx.fillStyle = phov ? '#fff' : 'rgba(255,255,255,0.6)';
        ctx.fillRect(bx-8, by-7, 5, 14); ctx.fillRect(bx+3, by-7, 5, 14);
        ctx.restore();

        drawInfoBtn();
    }
}

// ── INFO BUTTON ────────────────────────────────────────────────────────────
function drawInfoBtn() {
    const b = INFO_BTN, hov = !showInfo && hit(b, mx, my);
    ctx.save();
    rr(b.x, b.y, b.w, b.h, 8);
    ctx.fillStyle = hov ? 'rgba(0,0,0,0.6)' : 'rgba(0,0,0,0.4)'; ctx.fill();
    rr(b.x, b.y, b.w, b.h, 8);
    ctx.strokeStyle = hov ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.22)'; ctx.lineWidth=1.2; ctx.stroke();
    ctx.fillStyle = hov ? '#fff' : 'rgba(255,255,255,0.6)';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', b.x+b.w/2, b.y+b.h/2);
    ctx.restore();
}

// ── INFO PANEL ─────────────────────────────────────────────────────────────
function drawInfoPanel() {
    ctx.fillStyle = 'rgba(0,0,0,0.82)';
    ctx.fillRect(0, 0, W, H);

    const px=80, py=88, pw=640, ph=416;
    ctx.save();

    rr(px, py, pw, ph, 18);
    ctx.fillStyle = '#0a0a0a'; ctx.fill();
    rr(px, py, pw, ph, 18);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth=1.5; ctx.stroke();

    // Title bar tint
    rr(px, py, pw, 54, 18);
    ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Cómo Jugar', CX, py+27);

    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(px+1, py+54, pw-2, 1);

    const colL  = px+44;          // left column text start x
    const colR  = px+pw/2+24;     // right column text start x
    const colY  = py+82;
    const sepX  = px+pw/2;        // column separator x
    // max text widths — stop before the separator / panel edge
    const maxWL = sepX - (colL+18) - 10;
    const maxWR = (px+pw) - (colR+36) - 14;

    // Canvas has no native text wrap — this helper does it
    function wrapText(text, x, y, maxW, lineH) {
        const words = text.split(' ');
        let line = '', ly = y;
        for (const word of words) {
            const test = line ? line + ' ' + word : word;
            if (ctx.measureText(test).width > maxW && line) {
                ctx.fillText(line, x, ly);
                line = word; ly += lineH;
            } else line = test;
        }
        ctx.fillText(line, x, ly);
        return ly - y; // extra pixels consumed by wrapped lines
    }

    // ── Left column: Reglas ─────────────────────────────────────────────────
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.font = '600 11px system-ui, sans-serif';
    ctx.letterSpacing = '0.1em';
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('REGLAS', colL, colY);
    ctx.letterSpacing = '0';
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(colL, colY+4, maxWL+18, 1);

    const rules = [
        'Golpea la pelota con tu paleta',
        'Velocidad sube 5% por rebote',
        'Ángulo varía por zona de golpe',
        'Primero en anotar 5 puntos gana',
    ];

    ctx.font = '14px system-ui, sans-serif';
    let ry = colY + 28;
    rules.forEach(txt => {
        ctx.fillStyle = 'rgba(255,255,255,0.28)';
        ctx.beginPath(); ctx.arc(colL+5, ry-5, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.82)';
        ctx.textAlign = 'left';
        const extra = wrapText(txt, colL+18, ry, maxWL, 17);
        ry += 30 + extra;
    });

    // Controles section (y is dynamic — follows rules)
    const ctrlY = ry + 6;
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(colL, ctrlY-12, maxWL+18, 1);
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.font = '600 11px system-ui, sans-serif';
    ctx.letterSpacing = '0.1em';
    ctx.fillText('CONTROLES', colL, ctrlY);
    ctx.letterSpacing = '0';

    ['P1  —  W / S', 'P2  —  ↑ / ↓'].forEach((txt, i) => {
        const ty = ctrlY + 22 + i*26;
        ctx.fillStyle = 'rgba(255,255,255,0.28)';
        ctx.beginPath(); ctx.arc(colL+5, ty-5, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.72)';
        ctx.font = '600 13px system-ui, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(txt, colL+18, ty);
    });

    // Vertical separator
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(sepX, colY-8, 1, ph-colY+py-42);

    // ── Right column: Power-ups ─────────────────────────────────────────────
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.font = '600 11px system-ui, sans-serif';
    ctx.letterSpacing = '0.1em';
    ctx.fillText('POWER-UPS', colR, colY);
    ctx.letterSpacing = '0';
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(colR, colY+4, maxWR+36, 1);

    // GROW
    const g1y = colY + 50;
    ctx.fillStyle = '#32C864';
    ctx.beginPath(); ctx.arc(colR+14, g1y, 14, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle = '#32C864';
    ctx.font = 'bold 15px system-ui, sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('Verde — paleta crece', colR+36, g1y-2);
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.font = '13px system-ui, sans-serif';
    ctx.fillText('Dura 10 segundos', colR+36, g1y+16);

    // SHRINK
    const g2y = g1y + 74;
    ctx.fillStyle = '#DC3C3C';
    ctx.beginPath(); ctx.arc(colR+14, g2y, 14, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle = '#DC3C3C';
    ctx.font = 'bold 15px system-ui, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Rojo — paleta se encoge', colR+36, g2y-2);
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.font = '13px system-ui, sans-serif';
    ctx.fillText('Dura 10 segundos', colR+36, g2y+16);

    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.font = '13px system-ui, sans-serif';
    ctx.fillText('Aparecen cada 15 segundos', colR, g2y+50);
    ctx.fillText('en posición aleatoria del campo', colR, g2y+68);

    // Footer
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(px+1, py+ph-44, pw-2, 1);
    ctx.fillStyle = 'rgba(255,255,255,0.28)';
    ctx.font = '13px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Toca cualquier lugar para cerrar', CX, py+ph-16);

    ctx.restore();
}

// ── PAUSE ──────────────────────────────────────────────────────────────────
function drawPause(s) {
    drawGame(s);
    const alpha = theme === 'stadium' ? 0.40 : 0.62;
    ctx.fillStyle = `rgba(0,0,0,${alpha})`; ctx.fillRect(0,0,W,H);
    ctx.save();
    if (theme === 'stadium') { ctx.shadowColor='rgba(0,0,0,0.95)'; ctx.shadowBlur=12; }
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 52px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('Pausa', CX, CY-40);
    ctx.restore();
    drawBtn(R.PAUSED[0].x,R.PAUSED[0].y,R.PAUSED[0].w,R.PAUSED[0].h, 'Continuar', hit(R.PAUSED[0],mx,my),
        { fs:19,fw:'700',r:12,bg:'rgba(255,255,255,0.1)',hbg:'rgba(255,255,255,0.2)',bd:'rgba(255,255,255,0.4)',hbd:'rgba(255,255,255,1)' });
    drawBtn(R.PAUSED[1].x,R.PAUSED[1].y,R.PAUSED[1].w,R.PAUSED[1].h, 'Menú', hit(R.PAUSED[1],mx,my),
        { fs:16,fc:'rgba(255,255,255,0.7)',bg:'rgba(255,255,255,0.04)',hbg:'rgba(255,255,255,0.1)',bd:'rgba(255,255,255,0.18)',hbd:'rgba(255,255,255,0.6)' });
}

// ── GAME OVER ──────────────────────────────────────────────────────────────
function drawGameOver(s) {
    drawGame(s);
    const alpha = theme === 'stadium' ? 0.40 : 0.68;
    ctx.fillStyle = `rgba(0,0,0,${alpha})`; ctx.fillRect(0,0,W,H);
    ctx.save();
    if (theme === 'stadium') { ctx.shadowColor='rgba(0,0,0,0.95)'; ctx.shadowBlur=14; }
    ctx.fillStyle = '#FFDC00';
    ctx.font = 'bold 54px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText(`¡${s.winner} gana!`, CX, CY-45);
    ctx.restore();
    drawBtn(R.GAME_OVER[0].x,R.GAME_OVER[0].y,R.GAME_OVER[0].w,R.GAME_OVER[0].h, 'Jugar de nuevo', hit(R.GAME_OVER[0],mx,my),
        { fs:19,fw:'700',r:12,bg:'rgba(255,255,255,0.1)',hbg:'rgba(255,255,255,0.2)',bd:'rgba(255,255,255,0.4)',hbd:'rgba(255,255,255,1)' });
    drawBtn(R.GAME_OVER[1].x,R.GAME_OVER[1].y,R.GAME_OVER[1].w,R.GAME_OVER[1].h, 'Menú', hit(R.GAME_OVER[1],mx,my),
        { fs:16,fc:'rgba(255,255,255,0.7)',bg:'rgba(255,255,255,0.04)',hbg:'rgba(255,255,255,0.1)',bd:'rgba(255,255,255,0.18)',hbd:'rgba(255,255,255,0.6)' });
}

// ── RENDER LOOP ────────────────────────────────────────────────────────────
function render() {
    const s = gs;
    if      (!s)                            drawConnecting();
    else if (s.status === 'MENU')           drawMenu();
    else if (s.status === 'MODE_SELECTION') drawModeSelection();
    else if (s.status === 'PLAYING')        drawGame(s);
    else if (s.status === 'PAUSED')         { if (showInfo) drawGame(s); else drawPause(s); }
    else if (s.status === 'GAME_OVER')      drawGameOver(s);
    if (showInfo) drawInfoPanel();
    requestAnimationFrame(render);
}

connect();
requestAnimationFrame(render);
</script>
</body>
</html>
